version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./plants_dataset:/app/plants_dataset
      - ./uploads:/app/uploads
    environment:
      - PLANTS_DIR=/app/plants_dataset
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
